<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Улучшенная мини‑ферма</title>
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: var(--tg-theme-bg-color, #e9f0e9);
            color: var(--tg-theme-text-color, #2d3e2d);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
        }
        #app {
            width: 100%;
            max-width: 450px;
        }
        /* Шапка */
        .header {
            background: var(--tg-theme-secondary-bg-color, #ffffffd9);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(0,40,0,0.08);
        }
        .balance, .exp {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f5fff0;
            padding: 5px 12px;
            border-radius: 40px;
        }
        .premium-badge {
            background: gold;
            color: #3a3a00;
            padding: 4px 8px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .level-badge {
            background: #c8e6c9;
            border-radius: 20px;
            padding: 4px 10px;
            font-weight: 600;
        }
        .shop-btn {
            background: var(--tg-theme-button-color, #4caf50);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .shop-btn:active { opacity: 0.8; transform: scale(0.98); }

        /* Вкладки */
        .tabs {
            display: flex;
            background: var(--tg-theme-secondary-bg-color, #ffffffc0);
            border-radius: 40px;
            padding: 4px;
            margin-bottom: 16px;
            backdrop-filter: blur(4px);
            gap: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-radius: 30px;
            font-weight: 500;
            color: var(--tg-theme-hint-color, #5a6e5a);
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: var(--tg-theme-button-color, #4caf50);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        /* Секции */
        .section {
            display: none;
            margin-bottom: 20px;
        }
        .section.active { display: block; }

        /* Сетки */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 20px;
            padding: 12px 8px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,30,0,0.05);
            transition: 0.15s;
            cursor: pointer;
            border: 1px solid #cfe9cf;
        }
        .card:active { transform: scale(0.97); background: #e0f0e0; }
        .card.locked {
            opacity: 0.5;
            filter: grayscale(0.6);
            cursor: not-allowed;
            pointer-events: none;
        }
        .card .icon { font-size: 2.2rem; margin-bottom: 5px; }
        .card .title { font-weight: 600; font-size: 0.9rem; }
        .card .details { font-size: 0.7rem; color: #4f6b4f; margin: 4px 0; }
        .card .timer { font-weight: bold; color: #b85e00; }

        /* Инвентарь */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 15px 0;
        }
        .inv-item {
            background: #f1ffe7;
            border-radius: 16px;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid #b7d7b7;
        }
        .inv-item .icon { font-size: 1.6rem; }
        .inv-item .qty { font-weight: 600; }

        /* Квесты */
        .quest-item {
            background: #f9fff9;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #ffb74d;
        }
        .quest-desc { font-size: 0.9rem; }
        .quest-reward { font-weight: 600; color: #2e7d32; }
        .quest-btn {
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .quest-btn:disabled {
            background: #bdbdbd;
            cursor: not-allowed;
        }

        /* Модальное окно магазина (аналогично предыдущей версии, но расширено) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--tg-theme-bg-color, #fff);
            border-radius: 30px;
            padding: 24px;
            width: 90%;
            max-width: 380px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
        }
        .shop-item button {
            background: var(--tg-theme-button-color, #4caf50);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            cursor: pointer;
        }
        .close-btn {
            margin-top: 16px;
            width: 100%;
            background: #e0e0e0;
            border: none;
            border-radius: 40px;
            padding: 10px;
            cursor: pointer;
        }
        .footer-note {
            font-size: 0.75rem;
            color: var(--tg-theme-hint-color, #888);
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Шапка -->
    <div class="header">
        <div class="balance" id="balanceDisplay"><i class="fas fa-coins"></i> 0</div>
        <div class="exp" id="expDisplay"><i class="fas fa-star"></i> 0</div>
        <div id="premiumDisplay" class="premium-badge" style="display: none;"><i class="fas fa-crown"></i> Premium</div>
        <button class="shop-btn" id="shopBtn"><i class="fas fa-store"></i> Магазин</button>
    </div>

    <!-- Вкладки -->
    <div class="tabs" id="tabs">
        <div class="tab active" data-tab="farm"><i class="fas fa-tractor"></i> Ферма</div>
        <div class="tab" data-tab="animals"><i class="fas fa-paw"></i> Животные</div>
        <div class="tab" data-tab="inventory"><i class="fas fa-box"></i> Инвентарь</div>
        <div class="tab" data-tab="quests"><i class="fas fa-scroll"></i> Задания</div>
    </div>

    <!-- Секция: Ферма (грядки) -->
    <div id="farmSection" class="section active">
        <div class="grid" id="plotsContainer"></div>
        <div style="text-align: center; font-size: 0.9rem; color: #4f6b4f;">
            <i class="fas fa-seedling"></i> Нажми на грядку, чтобы посадить выбранную культуру
        </div>
        <!-- Выбор культуры для посадки -->
        <div style="margin: 15px 0 10px; background: #f0faf0; border-radius: 30px; padding: 10px;">
            <div style="display: flex; gap: 10px; justify-content: center;" id="cropSelection">
                <!-- Динамически заполняется скриптом -->
            </div>
            <div style="font-size:0.8rem; margin-top:5px;">⬆️ выбери, что сажать</div>
        </div>
    </div>

    <!-- Секция: Животные -->
    <div id="animalsSection" class="section">
        <div class="grid" id="animalPlotsContainer"></div>
        <div style="margin: 15px 0 10px; background: #f0faf0; border-radius: 30px; padding: 10px;">
            <div style="display: flex; gap: 10px; justify-content: center;" id="animalSelection">
                <!-- выбор животного -->
            </div>
        </div>
    </div>

    <!-- Секция: Инвентарь -->
    <div id="inventorySection" class="section">
        <div class="inventory-grid" id="inventoryContainer"></div>
        <button class="shop-btn" id="sellAllBtn" style="width:100%; margin-top:10px;"><i class="fas fa-hand-holding-usd"></i> Продать всё</button>
    </div>

    <!-- Секция: Задания -->
    <div id="questsSection" class="section">
        <div id="questsContainer"></div>
    </div>

    <!-- Модалка магазина (покупки за Stars и монеты) -->
    <div class="modal" id="shopModal">
        <div class="modal-content">
            <h2><i class="fas fa-shopping-cart"></i> Магазин</h2>
            <div class="shop-item">
                <span><i class="fas fa-coins"></i> 50 монет</span>
                <button id="buyCoins50">1 ⭐</button>
            </div>
            <div class="shop-item">
                <span><i class="fas fa-coins"></i> 200 монет</span>
                <button id="buyCoins200">3 ⭐</button>
            </div>
            <div class="shop-item">
                <span><i class="fas fa-crown"></i> Премиум (30 дней)</span>
                <button id="buyPremium">5 ⭐</button>
            </div>
            <div class="shop-item">
                <span><i class="fas fa-tree"></i> Новая грядка (ферма)</span>
                <button id="buyPlotFarm">50 🪙</button>
            </div>
            <div class="shop-item">
                <span><i class="fas fa-dog"></i> Клетка для животного</span>
                <button id="buyAnimalPlot">40 🪙</button>
            </div>
            <div class="shop-item">
                <span><i class="fas fa-egg"></i> Курица (несушка)</span>
                <button id="buyChicken">30 🪙</button>
            </div>
            <button class="close-btn" id="closeShop">Закрыть</button>
        </div>
    </div>

    <div class="footer-note">🌱 Расти большим! v2.0</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    (function() {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ---------- КОНФИГУРАЦИЯ ----------
        const PRODUCTS = {
            coins50: 'YOUR_COIN50_SLUG',
            coins200: 'YOUR_COIN200_SLUG',
            premium30: 'YOUR_PREMIUM_SLUG'
        };

        // Данные о культурах
        const CROPS = {
            wheat: { name: 'Пшеница', icon: '🌾', cost: 5, growTime: 30000, sellPrice: 10, exp: 5, levelReq: 1 },
            carrot: { name: 'Морковь', icon: '🥕', cost: 8, growTime: 45000, sellPrice: 15, exp: 8, levelReq: 2 },
            strawberry: { name: 'Клубника', icon: '🍓', cost: 12, growTime: 60000, sellPrice: 25, exp: 12, levelReq: 3 }
        };

        // Данные о животных
        const ANIMALS = {
            chicken: { name: 'Курица', icon: '🐔', cost: 30, produceTime: 60000, produce: { item: 'egg', qty: 1, sellPrice: 8 }, exp: 6, levelReq: 1 }
        };

        // Инвентарь (ресурсы)
        const INVENTORY_ITEMS = {
            egg: { name: 'Яйцо', icon: '🥚', sellPrice: 8 },
            wheat: { name: 'Пшеница', icon: '🌾', sellPrice: 10 },
            carrot: { name: 'Морковь', icon: '🥕', sellPrice: 15 },
            strawberry: { name: 'Клубника', icon: '🍓', sellPrice: 25 }
        };

        // Задания (пример)
        const QUESTS = [
            { id: 'q1', desc: 'Посади 3 пшеницы', target: { type: 'plant', crop: 'wheat', count: 3 }, rewardCoins: 20, rewardExp: 15, progress: 0, completed: false },
            { id: 'q2', desc: 'Собери 2 яйца', target: { type: 'collect', item: 'egg', count: 2 }, rewardCoins: 25, rewardExp: 10, progress: 0, completed: false },
            { id: 'q3', desc: 'Получи уровень 2', target: { type: 'level', level: 2 }, rewardCoins: 50, rewardExp: 30, progress: 0, completed: false }
        ];

        // ---------- НАЧАЛЬНОЕ СОСТОЯНИЕ ----------
        let farmData = {
            balance: 20,
            exp: 0,
            level: 1,
            // грядки на ферме
            farmPlots: [],           // массив { state: 'empty'/'growing'/'ready', crop: null, endTime: null }
            unlockedFarmPlots: 2,
            // клетки для животных
            animalPlots: [],         // массив { state: 'empty'/'occupied', animal: null, endTime: null, produceTime: null }
            unlockedAnimalPlots: 1,
            // инвентарь
            inventory: { egg: 0, wheat: 0, carrot: 0, strawberry: 0 },
            premiumUntil: null,
            lastUpdate: Date.now(),
            quests: JSON.parse(JSON.stringify(QUESTS)) // копия
        };

        // Выбранная культура для посадки (по умолчанию пшеница)
        let selectedCrop = 'wheat';
        let selectedAnimal = 'chicken';

        // ---------- ФУНКЦИИ ШИФРОВАНИЯ ----------
        function getKey() {
            const user = tg.initDataUnsafe?.user;
            return user ? String(user.id) : 'fallback_secret_key_123';
        }

        function encryptData(obj) {
            const json = JSON.stringify(obj);
            const key = getKey();
            const encoder = new TextEncoder();
            const bytes = encoder.encode(json);
            const keyBytes = encoder.encode(key);
            const encrypted = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) {
                encrypted[i] = bytes[i] ^ keyBytes[i % keyBytes.length];
            }
            return btoa(String.fromCharCode(...encrypted));
        }

        function decryptData(encryptedBase64) {
            try {
                const encryptedStr = atob(encryptedBase64);
                const encrypted = Uint8Array.from(encryptedStr, c => c.charCodeAt(0));
                const key = getKey();
                const keyBytes = new TextEncoder().encode(key);
                const decrypted = new Uint8Array(encrypted.length);
                for (let i = 0; i < encrypted.length; i++) {
                    decrypted[i] = encrypted[i] ^ keyBytes[i % keyBytes.length];
                }
                const json = new TextDecoder().decode(decrypted);
                return JSON.parse(json);
            } catch (e) {
                console.warn('Ошибка расшифровки', e);
                return null;
            }
        }

        // ---------- ЗАГРУЗКА/СОХРАНЕНИЕ ----------
        function loadFromCloud() {
            tg.CloudStorage.getItem('farmData', (err, val) => {
                if (err || !val) {
                    console.log('Нет данных, инициализация');
                    initDefaultState();
                } else {
                    const decrypted = decryptData(val);
                    if (decrypted) {
                        farmData = decrypted;
                        // Убедимся, что все поля существуют (для обновлений)
                        if (!farmData.farmPlots) farmData.farmPlots = [];
                        if (!farmData.animalPlots) farmData.animalPlots = [];
                        if (!farmData.inventory) farmData.inventory = { egg:0, wheat:0, carrot:0, strawberry:0 };
                        if (!farmData.quests) farmData.quests = JSON.parse(JSON.stringify(QUESTS));
                        if (!farmData.unlockedAnimalPlots) farmData.unlockedAnimalPlots = 1;
                    } else {
                        initDefaultState();
                    }
                }
                updateLevel(); // пересчитываем уровень на основе exp
                renderAll();
                startTimers();
            });
        }

        function initDefaultState() {
            farmData = {
                balance: 20,
                exp: 0,
                level: 1,
                farmPlots: [],
                unlockedFarmPlots: 2,
                animalPlots: [],
                unlockedAnimalPlots: 1,
                inventory: { egg:0, wheat:0, carrot:0, strawberry:0 },
                premiumUntil: null,
                lastUpdate: Date.now(),
                quests: JSON.parse(JSON.stringify(QUESTS))
            };
            for (let i = 0; i < 6; i++) {
                farmData.farmPlots[i] = { state: 'empty', crop: null, endTime: null };
            }
            for (let i = 0; i < 3; i++) {
                farmData.animalPlots[i] = { state: 'empty', animal: null, endTime: null, produceTime: null };
            }
        }

        function saveToCloud() {
            farmData.lastUpdate = Date.now();
            const encrypted = encryptData(farmData);
            tg.CloudStorage.setItem('farmData', encrypted, (err) => {
                if (err) console.warn('Ошибка сохранения:', err);
            });
        }

        // ---------- УРОВЕНЬ ----------
        function getExpForLevel(level) {
            return level * 50; // просто для примера: 50, 100, 150...
        }

        function updateLevel() {
            while (farmData.exp >= getExpForLevel(farmData.level)) {
                farmData.level++;
            }
        }

        // ---------- ПРОВЕРКА ПОДПИСКИ ----------
        function isPremiumActive() {
            return farmData.premiumUntil && farmData.premiumUntil > Date.now();
        }

        // ---------- ГРЯДКИ ФЕРМЫ ----------
        function handleFarmPlotClick(index) {
            if (index >= farmData.unlockedFarmPlots) return;
            const plot = farmData.farmPlots[index];
            const now = Date.now();

            if (plot.state === 'empty') {
                // Посадка выбранной культуры
                const crop = CROPS[selectedCrop];
                if (!crop) return;
                if (farmData.level < crop.levelReq) {
                    tg.showAlert(`Нужен уровень ${crop.levelReq} для этой культуры!`);
                    return;
                }
                if (farmData.balance < crop.cost) {
                    tg.showAlert('Недостаточно монет!');
                    return;
                }
                farmData.balance -= crop.cost;
                plot.state = 'growing';
                plot.crop = selectedCrop;
                let growTime = crop.growTime;
                if (isPremiumActive()) growTime = Math.floor(growTime * 0.7); // ускорение на 30%
                plot.endTime = now + growTime;
                saveAndRender();
            }
            else if (plot.state === 'growing') {
                if (plot.endTime <= now) {
                    plot.state = 'ready';
                    plot.endTime = null;
                    saveAndRender();
                }
            }
            else if (plot.state === 'ready') {
                // Сбор урожая -> в инвентарь
                const crop = CROPS[plot.crop];
                if (crop) {
                    farmData.inventory[plot.crop] = (farmData.inventory[plot.crop] || 0) + 1;
                    farmData.exp += crop.exp;
                    updateLevel();
                    // Обновляем квесты (посадка уже была учтена, сбор отдельно?)
                    updateQuests('collect', plot.crop);
                }
                plot.state = 'empty';
                plot.crop = null;
                saveAndRender();
            }
        }

        // ---------- ЖИВОТНЫЕ ----------
        function handleAnimalPlotClick(index) {
            if (index >= farmData.unlockedAnimalPlots) return;
            const plot = farmData.animalPlots[index];
            const now = Date.now();

            if (plot.state === 'empty') {
                // Покупка и размещение животного
                const animal = ANIMALS[selectedAnimal];
                if (!animal) return;
                if (farmData.level < animal.levelReq) {
                    tg.showAlert(`Нужен уровень ${animal.levelReq}`);
                    return;
                }
                if (farmData.balance < animal.cost) {
                    tg.showAlert('Недостаточно монет');
                    return;
                }
                farmData.balance -= animal.cost;
                plot.state = 'occupied';
                plot.animal = selectedAnimal;
                let produceTime = animal.produceTime;
                if (isPremiumActive()) produceTime = Math.floor(produceTime * 0.7);
                plot.endTime = now + produceTime;
                plot.produceTime = produceTime;
                saveAndRender();
            }
            else if (plot.state === 'occupied') {
                // Если пришло время собирать продукт
                if (plot.endTime <= now) {
                    const animal = ANIMALS[plot.animal];
                    if (animal) {
                        // добавить продукт в инвентарь
                        const prod = animal.produce;
                        farmData.inventory[prod.item] = (farmData.inventory[prod.item] || 0) + prod.qty;
                        farmData.exp += animal.exp;
                        updateLevel();
                        updateQuests('collect', prod.item);
                        // сброс таймера
                        let nextTime = animal.produceTime;
                        if (isPremiumActive()) nextTime = Math.floor(nextTime * 0.7);
                        plot.endTime = now + nextTime;
                    }
                    saveAndRender();
                } else {
                    // Можно показать оставшееся время, но ничего не делаем
                }
            }
        }

        // ---------- ИНВЕНТАРЬ ----------
        function sellAllInventory() {
            let total = 0;
            for (let item in farmData.inventory) {
                const qty = farmData.inventory[item];
                if (qty > 0 && INVENTORY_ITEMS[item]) {
                    total += qty * INVENTORY_ITEMS[item].sellPrice;
                    farmData.inventory[item] = 0;
                }
            }
            if (total > 0) {
                farmData.balance += total;
                tg.showAlert(`Продано за ${total} монет!`);
                saveAndRender();
            } else {
                tg.showAlert('Инвентарь пуст');
            }
        }

        // ---------- ЗАДАНИЯ ----------
        function updateQuests(action, target) {
            farmData.quests.forEach(q => {
                if (q.completed) return;
                const t = q.target;
                if (t.type === action) {
                    if (action === 'plant' && t.crop === target) q.progress = (q.progress || 0) + 1;
                    if (action === 'collect' && t.item === target) q.progress = (q.progress || 0) + 1;
                    if (action === 'level' && farmData.level >= t.level) q.progress = t.count || 1;
                    if (q.progress >= t.count) q.completed = true;
                }
            });
        }

        function claimQuest(questId) {
            const q = farmData.quests.find(q => q.id === questId);
            if (!q || !q.completed) return;
            farmData.balance += q.rewardCoins;
            farmData.exp += q.rewardExp;
            q.completed = false; // удаляем или делаем выполненным навсегда (можно заменить)
            q.progress = 0;
            // В реальности лучше убирать задание и добавлять новое, но для демо просто сбрасываем
            updateLevel();
            saveAndRender();
        }

        // ---------- ПОКУПКИ В МАГАЗИНЕ ----------
        function buyProduct(slug, callback) {
            tg.openInvoice(slug, (status) => {
                if (status === 'paid') callback();
                else tg.showAlert('Платёж не завершён');
            });
        }

        // ---------- ОТРИСОВКА ----------
        function renderAll() {
            renderHeader();
            renderFarmPlots();
            renderAnimalPlots();
            renderInventory();
            renderQuests();
            renderCropSelection();
            renderAnimalSelection();
        }

        function renderHeader() {
            document.getElementById('balanceDisplay').innerHTML = `<i class="fas fa-coins"></i> ${farmData.balance}`;
            document.getElementById('expDisplay').innerHTML = `<i class="fas fa-star"></i> ${farmData.exp} (ур. ${farmData.level})`;
            const premiumDiv = document.getElementById('premiumDisplay');
            if (isPremiumActive()) {
                const days = Math.ceil((farmData.premiumUntil - Date.now()) / (86400000));
                premiumDiv.style.display = 'inline-flex';
                premiumDiv.innerHTML = `<i class="fas fa-crown"></i> Premium (${days}д)`;
            } else {
                premiumDiv.style.display = 'none';
            }
        }

        function renderFarmPlots() {
            const container = document.getElementById('plotsContainer');
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const plot = farmData.farmPlots[i] || { state: 'empty', crop: null, endTime: null };
                const card = document.createElement('div');
                card.className = 'card';
                if (i >= farmData.unlockedFarmPlots) {
                    card.classList.add('locked');
                    card.innerHTML = `<div class="icon"><i class="fas fa-lock"></i></div><div class="title">Заблокировано</div>`;
                } else {
                    if (plot.state === 'empty') {
                        card.innerHTML = `<div class="icon"><i class="fas fa-seedling"></i></div><div class="title">Пустая</div><div class="details">посадить</div>`;
                    } else if (plot.state === 'growing') {
                        const remaining = Math.max(0, Math.ceil((plot.endTime - Date.now()) / 1000));
                        const cropIcon = CROPS[plot.crop]?.icon || '🌱';
                        card.innerHTML = `<div class="icon">${cropIcon}</div><div class="title">Растёт</div><div class="timer">${remaining}с</div>`;
                    } else if (plot.state === 'ready') {
                        const cropIcon = CROPS[plot.crop]?.icon || '🌾';
                        card.innerHTML = `<div class="icon">${cropIcon}</div><div class="title">Готово!</div><div class="details">собрать</div>`;
                    }
                }
                card.addEventListener('click', (e) => { e.stopPropagation(); handleFarmPlotClick(i); });
                container.appendChild(card);
            }
        }

        function renderAnimalPlots() {
            const container = document.getElementById('animalPlotsContainer');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const plot = farmData.animalPlots[i] || { state: 'empty', animal: null, endTime: null };
                const card = document.createElement('div');
                card.className = 'card';
                if (i >= farmData.unlockedAnimalPlots) {
                    card.classList.add('locked');
                    card.innerHTML = `<div class="icon"><i class="fas fa-lock"></i></div><div class="title">Клетка заблок.</div>`;
                } else {
                    if (plot.state === 'empty') {
                        card.innerHTML = `<div class="icon"><i class="fas fa-house"></i></div><div class="title">Пустая клетка</div><div class="details">купить животное</div>`;
                    } else if (plot.state === 'occupied') {
                        const animal = ANIMALS[plot.animal];
                        const remaining = Math.max(0, Math.ceil((plot.endTime - Date.now()) / 1000));
                        card.innerHTML = `<div class="icon">${animal.icon}</div><div class="title">${animal.name}</div><div class="timer">${remaining}с</div>`;
                    }
                }
                card.addEventListener('click', (e) => { e.stopPropagation(); handleAnimalPlotClick(i); });
                container.appendChild(card);
            }
        }

        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            container.innerHTML = '';
            for (let key in INVENTORY_ITEMS) {
                const item = INVENTORY_ITEMS[key];
                const qty = farmData.inventory[key] || 0;
                const div = document.createElement('div');
                div.className = 'inv-item';
                div.innerHTML = `<div class="icon">${item.icon}</div><div class="qty">${qty}</div><div style="font-size:0.7rem;">${item.sellPrice}🪙</div>`;
                container.appendChild(div);
            }
        }

        function renderQuests() {
            const container = document.getElementById('questsContainer');
            container.innerHTML = '';
            farmData.quests.forEach(q => {
                const div = document.createElement('div');
                div.className = 'quest-item';
                div.innerHTML = `
                    <div class="quest-desc">${q.desc} (${q.progress}/${q.target.count})</div>
                    <div><span class="quest-reward">+${q.rewardCoins}🪙 +${q.rewardExp}⭐</span>
                    <button class="quest-btn" ${!q.completed ? 'disabled' : ''} data-id="${q.id}">забрать</button></div>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('.quest-btn:not([disabled])').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    claimQuest(id);
                });
            });
        }

        function renderCropSelection() {
            const container = document.getElementById('cropSelection');
            container.innerHTML = '';
            for (let key in CROPS) {
                const crop = CROPS[key];
                const btn = document.createElement('button');
                btn.className = 'shop-btn';
                btn.style.margin = '0 2px';
                btn.style.padding = '6px 10px';
                btn.innerHTML = `${crop.icon} ${crop.name} (${crop.cost}🪙)`;
                if (farmData.level < crop.levelReq) btn.disabled = true;
                btn.addEventListener('click', () => { selectedCrop = key; });
                container.appendChild(btn);
            }
        }

        function renderAnimalSelection() {
            const container = document.getElementById('animalSelection');
            container.innerHTML = '';
            for (let key in ANIMALS) {
                const animal = ANIMALS[key];
                const btn = document.createElement('button');
                btn.className = 'shop-btn';
                btn.innerHTML = `${animal.icon} ${animal.name} (${animal.cost}🪙)`;
                if (farmData.level < animal.levelReq) btn.disabled = true;
                btn.addEventListener('click', () => { selectedAnimal = key; });
                container.appendChild(btn);
            }
        }

        // ---------- ТАЙМЕРЫ ----------
        let timerInterval = null;
        function startTimers() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let changed = false;
                const now = Date.now();
                // Ферма
                for (let i = 0; i < farmData.unlockedFarmPlots; i++) {
                    const plot = farmData.farmPlots[i];
                    if (plot.state === 'growing' && plot.endTime <= now) {
                        plot.state = 'ready';
                        plot.endTime = null;
                        changed = true;
                    }
                }
                // Животные (сбор автоматический через клик, но таймер обновляет отображение)
                if (changed) {
                    renderAll();
                    saveToCloud();
                } else {
                    // просто обновим отображение времени
                    renderFarmPlots();
                    renderAnimalPlots();
                }
            }, 1000);
        }

        // ---------- ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК ----------
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const sectionId = tab.dataset.tab;
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(sectionId + 'Section').classList.add('active');
            });
        });

        // ---------- МАГАЗИН ----------
        const modal = document.getElementById('shopModal');
        document.getElementById('shopBtn').addEventListener('click', () => modal.classList.add('active'));
        document.getElementById('closeShop').addEventListener('click', () => modal.classList.remove('active'));
        window.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

        // Кнопки магазина
        document.getElementById('buyCoins50').addEventListener('click', () => {
            buyProduct(PRODUCTS.coins50, () => { farmData.balance += 50; saveAndRender(); });
        });
        document.getElementById('buyCoins200').addEventListener('click', () => {
            buyProduct(PRODUCTS.coins200, () => { farmData.balance += 200; saveAndRender(); });
        });
        document.getElementById('buyPremium').addEventListener('click', () => {
            buyProduct(PRODUCTS.premium30, () => {
                farmData.premiumUntil = Date.now() + 30 * 86400000;
                if (farmData.unlockedFarmPlots < 6) farmData.unlockedFarmPlots++;
                saveAndRender();
            });
        });
        document.getElementById('buyPlotFarm').addEventListener('click', () => {
            if (farmData.balance < 50) return tg.showAlert('Недостаточно монет');
            if (farmData.unlockedFarmPlots >= 6) return tg.showAlert('Максимум грядок');
            farmData.balance -= 50;
            farmData.unlockedFarmPlots++;
            saveAndRender();
        });
        document.getElementById('buyAnimalPlot').addEventListener('click', () => {
            if (farmData.balance < 40) return tg.showAlert('Недостаточно монет');
            if (farmData.unlockedAnimalPlots >= 3) return tg.showAlert('Максимум клеток');
            farmData.balance -= 40;
            farmData.unlockedAnimalPlots++;
            saveAndRender();
        });
        document.getElementById('buyChicken').addEventListener('click', () => {
            if (farmData.balance < 30) return tg.showAlert('Недостаточно монет');
            // можно добавить логику, что сначала надо купить клетку, но упростим: просто тратим монеты и добавляем курицу в первую пустую клетку
            const freeIdx = farmData.animalPlots.findIndex((p, idx) => idx < farmData.unlockedAnimalPlots && p.state === 'empty');
            if (freeIdx === -1) return tg.showAlert('Нет свободной клетки');
            farmData.balance -= 30;
            farmData.animalPlots[freeIdx].state = 'occupied';
            farmData.animalPlots[freeIdx].animal = 'chicken';
            let produceTime = ANIMALS.chicken.produceTime;
            if (isPremiumActive()) produceTime = Math.floor(produceTime * 0.7);
            farmData.animalPlots[freeIdx].endTime = Date.now() + produceTime;
            farmData.animalPlots[freeIdx].produceTime = produceTime;
            saveAndRender();
        });

        document.getElementById('sellAllBtn').addEventListener('click', sellAllInventory);

        // ---------- ЗАПУСК ----------
        loadFromCloud();
    })();
</script>
</body>
</html>
